---
- name: Obtener uso de CPU en Windows (usando módulo)
  hosts: os_windows
  gather_facts: false
 
  tasks:
    - name: Obtener CPU con WMIC
      ansible.windows.win_command: >
        wmic cpu get loadpercentage
      register: cpu_output
 
    - name: Limpiar salida
      set_fact:
        cpu_percent: "{{ cpu_output.stdout_lines[1] | trim }}"
 
    - name: Mostrar uso de CPU
      ansible.builtin.debug:
        msg: "Uso de CPU en {{ inventory_hostname }}: {{ cpu_percent }}%"


    - name: Obtener lista de servicios en Windows
      ansible.windows.win_service_info:
      register: servicios
    
    # - name: Mostrar todos los servicios
    #   ansible.builtin.debug:
    #     var: servicios.services

    - name: Consultar servicio WinRM sin detener el playbook
      ansible.windows.win_service_info:
        name: WinRM
      register: resultado_servicio
      failed_when: false
    
    - name: Mostrar estado del servicio si existe
      ansible.builtin.debug:
        msg: "El servicio WinRM está: {{ resultado_servicio.services[0].state }}"
      when: resultado_servicio.services | length > 0
    
    - name: Informar si el servicio no existe
      ansible.builtin.debug:
        msg: "El servicio WinRM no existe en este servidor"
      when: resultado_servicio.services | length == 0
      
    - name: Crear usuario en Windows
      ansible.windows.win_user:
        name: ecuador
        password: "P@ssw0rd123!"   # cambia la contraseña
        state: present
        groups:
          - Users
        password_never_expires: yes


    - name: Actualizar sistema operativo Windows
      ansible.windows.win_updates:
        category_names:
          - SecurityUpdates
          - CriticalUpdates
          - UpdateRollups
        state: installed
        reboot: false